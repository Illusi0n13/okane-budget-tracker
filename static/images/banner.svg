<text x="468" y="177" fill="#4CAF50" font-size="9" font-family="system-ui,sans-serif" font-weight="700" text-anchor="middle">&#8377;12,000</text>
<text x="468" y="191" fill="#8B949E" font-size="7" font-family="system-ui,sans-serif" text-anchor="middle">Income</text>

<rect x="520" y="162" width="84" height="38" rx="8" fill="#1C2330" stroke="rgba(255,107,157,0.3)" stroke-width="0.5"/>
