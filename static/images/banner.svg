<text x="438" y="228" font-size="14">&#x1F695;</text>
<text x="456" y="225" fill="#E8EDF5" font-size="8" font-family="system-ui,sans-serif" font-weight="600">Cab to office</text>
<text x="456" y="234" fill="#8B949E" font-size="7" font-family="system-ui,sans-serif">Cab · Today</text>
<text x="598" y="228" fill="#FF6B9D" font-size="9" font-family="system-ui,sans-serif" font-weight="700" text-anchor="end">-&#8377;120</text>

<rect x="426" y="244" width="178" height="28" rx="7" fill="#1C2330" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>
<text x="438" y="262" font-size="14">&#x1F35C;</text>
<text x="456" y="259" fill="#E8EDF5" font-size="8" font-family="system-ui,sans-serif" font-weight="600">Lunch</text>
<text x="456" y="268" fill="#8B949E" font-size="7" font-family="system-ui,sans-serif">Food · Today</text>
<text x="598" y="262" fill="#FF6B9D" font-size="9" font-family="system-ui,sans-serif" font-weight="700" text-anchor="end">-&#8377;85</text>

<rect x="426" y="278" width="178" height="28" rx="7" fill="#1C2330" stroke="rgba(76,175,80,0.18)" stroke-width="0.5"/>
<text x="438" y="296" font-size="14">&#x1F4BC;</text>
<text x="456" y="293" fill="#E8EDF5" font-size="8" font-family="system-ui,sans-serif" font-weight="600">Salary</text>
<text x="456" y="302" fill="#8B949E" font-size="7" font-family="system-ui,sans-serif">Income · Apr</text>
<text x="598" y="296" fill="#4CAF50" font-size="9" font-family="system-ui,sans-serif" font-weight="700" text-anchor="end">+&#8377;12,000</text>

<!-- Bottom nav -->
<rect x="418" y="315" width="194" height="20" rx="0" fill="#161B22"/>
<text x="447" y="328" font-size="10" text-anchor="middle">&#x1F3E0;</text>
<text x="480" y="328" font-size="10" text-anchor="middle">&#x2795;</text>
<text x="515" y="328" font-size="10" text-anchor="middle">&#x1F4B8;</text>
<text x="550" y="328" font-size="10" text-anchor="middle">&#x1F4CA;</text>
<rect x="438" y="333" width="18" height="2" rx="1" fill="#FF6B9D"/>

<!-- App icon -->
<rect x="52" y="52" width="54" height="54" rx="16" fill="#FF6B9D"/>
<rect x="52" y="52" width="54" height="54" rx="16" fill="rgba(199,125,255,0.4)"/>
<text x="79" y="87" font-size="26" text-anchor="middle">&#x1F4B4;</text>

<!-- Branding -->
<text x="52" y="134" fill="#FF6B9D" font-size="22" font-family="system-ui,sans-serif" font-weight="700">&#x304A;&#x91D1;&#x30C8;&#x30E9;&#x30C3;&#x30AB;&#x30FC;</text>
<text x="52" y="158" fill="#E8EDF5" font-size="26" font-family="system-ui,sans-serif" font-weight="700">Okane</text>
<text x="52" y="186" fill="#E8EDF5" font-size="26" font-family="system-ui,sans-serif" font-weight="700">Budget Tracker</text>
<text x="52" y="218" fill="#8B949E" font-size="13" font-family="system-ui,sans-serif">Track smarter. Save better.</text>
<line x1="52" y1="235" x2="340" y2="235" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/>

<!-- Tech pills -->
<rect x="52" y="250" width="62" height="20" rx="10" fill="rgba(126,200,227,0.12)" stroke="rgba(126,200,227,0.3)" stroke-width="0.5"/>
<text x="83" y="264" fill="#7EC8E3" font-size="10" font-family="system-ui,sans-serif" text-anchor="middle">Python</text>
<rect x="122" y="250" width="46" height="20" rx="10" fill="rgba(255,107,157,0.12)" stroke="rgba(255,107,157,0.3)" stroke-width="0.5"/>
