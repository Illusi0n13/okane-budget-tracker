<text x="160" y="292" fill="#7EC8E3" font-size="10" font-family="system-ui,sans-serif" text-anchor="middle">REST API</text>

<!-- Feature list -->
<rect x="52" y="318" width="14" height="14" rx="3" fill="rgba(255,107,157,0.2)"/>
<text x="59" y="329" font-size="9" text-anchor="middle">&#x1F465;</text>
<text x="72" y="329" fill="#8B949E" font-size="11" font-family="system-ui,sans-serif">Multi-user</text>
<rect x="52" y="338" width="14" height="14" rx="3" fill="rgba(6,214,160,0.2)"/>
<text x="59" y="349" font-size="9" text-anchor="middle">&#x1F4F4;</text>
<text x="72" y="349" fill="#8B949E" font-size="11" font-family="system-ui,sans-serif">Offline-first PWA</text>
<rect x="170" y="318" width="14" height="14" rx="3" fill="rgba(255,209,102,0.2)"/>
<text x="177" y="329" font-size="9" text-anchor="middle">&#x1F4CA;</text>
<text x="190" y="329" fill="#8B949E" font-size="11" font-family="system-ui,sans-serif">Yearly analytics</text>
<rect x="170" y="338" width="14" height="14" rx="3" fill="rgba(199,125,255,0.2)"/>
<text x="177" y="349" font-size="9" text-anchor="middle">&#x1F510;</text>
<text x="190" y="349" fill="#8B949E" font-size="11" font-family="system-ui,sans-serif">Secure auth</text>

<!-- Floating petals -->
<g class="p1" transform-origin="72 195">
  <ellipse cx="72" cy="195" rx="7" ry="4" fill="#FF6B9D" opacity="0.6" transform="rotate(-30 72 195)"/>
  <ellipse cx="80" cy="192" rx="7" ry="4" fill="#FFB3CE" opacity="0.5" transform="rotate(20 80 192)"/>
</g>
<g class="p2" transform-origin="330 100">
  <ellipse cx="330" cy="100" rx="6" ry="3.5" fill="#C77DFF" opacity="0.5" transform="rotate(15 330 100)"/>
  <ellipse cx="338" cy="97" rx="6" ry="3.5" fill="#FFB3CE" opacity="0.4" transform="rotate(-25 338 97)"/>
</g>
<g class="p3" transform-origin="380 300">
  <ellipse cx="380" cy="300" rx="6" ry="3.5" fill="#FF6B9D" opacity="0.45" transform="rotate(40 380 300)"/>
