<svg width="100%" viewBox="0 0 680 380" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Okane Budget Tracker — project banner</title>
<desc>A dark-themed anime-style project banner for the Okane Budget Tracker app showing a phone mockup with budget data, floating sakura petals, and app branding.</desc>

<style>
  @keyframes float1{0%,100%{transform:translateY(0) rotate(-8deg)}50%{transform:translateY(-10px) rotate(4deg)}}
  @keyframes float2{0%,100%{transform:translateY(0) rotate(12deg)}50%{transform:translateY(-14px) rotate(-6deg)}}
  @keyframes float3{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-8px) rotate(8deg)}}
  @keyframes pulse{0%,100%{opacity:0.6}50%{opacity:1}}
  .p1{animation:float1 4s ease-in-out infinite}
  .p2{animation:float2 5.5s ease-in-out infinite}
  .p3{animation:float3 3.8s ease-in-out infinite}
  .glow{animation:pulse 3s ease-in-out infinite}
</style>

<!-- Background -->
<rect width="680" height="380" fill="#0D1117" rx="16"/>

<!-- Subtle radial glows -->
<ellipse cx="160" cy="160" rx="180" ry="140" fill="rgba(199,125,255,0.07)"/>
<ellipse cx="520" cy="240" rx="160" ry="130" fill="rgba(255,107,157,0.06)"/>
<ellipse cx="340" cy="380" rx="220" ry="100" fill="rgba(126,200,227,0.05)"/>

<!-- Dot grid top-right -->
<g fill="rgba(255,255,255,0.06)">
  <circle cx="560" cy="30" r="2"/><circle cx="580" cy="30" r="2"/><circle cx="600" cy="30" r="2"/><circle cx="620" cy="30" r="2"/><circle cx="640" cy="30" r="2"/>
  <circle cx="560" cy="50" r="2"/><circle cx="580" cy="50" r="2"/><circle cx="600" cy="50" r="2"/><circle cx="620" cy="50" r="2"/><circle cx="640" cy="50" r="2"/>
  <circle cx="560" cy="70" r="2"/><circle cx="580" cy="70" r="2"/><circle cx="600" cy="70" r="2"/><circle cx="620" cy="70" r="2"/><circle cx="640" cy="70" r="2"/>
  <circle cx="560" cy="90" r="2"/><circle cx="580" cy="90" r="2"/><circle cx="600" cy="90" r="2"/><circle cx="620" cy="90" r="2"/><circle cx="640" cy="90" r="2"/>
</g>

<!-- Dot grid bottom-left -->
<g fill="rgba(255,255,255,0.04)">
  <circle cx="40" cy="300" r="2"/><circle cx="60" cy="300" r="2"/><circle cx="80" cy="300" r="2"/>
  <circle cx="40" cy="320" r="2"/><circle cx="60" cy="320" r="2"/><circle cx="80" cy="320" r="2"/>
  <circle cx="40" cy="340" r="2"/><circle cx="60" cy="340" r="2"/><circle cx="80" cy="340" r="2"/>
  <circle cx="40" cy="360" r="2"/><circle cx="60" cy="360" r="2"/><circle cx="80" cy="360" r="2"/>
</g>

<!-- Phone mockup -->
<rect x="410" y="40" width="210" height="310" rx="24" fill="#161B22" stroke="rgba(255,107,157,0.35)" stroke-width="1.5"/>
<rect x="418" y="55" width="194" height="280" rx="16" fill="#0D1117"/>
<rect x="490" y="55" width="50" height="10" rx="5" fill="#161B22"/>

<!-- Hero card -->
<rect x="426" y="72" width="178" height="80" rx="10" fill="#161B22" stroke="rgba(255,107,157,0.2)" stroke-width="0.5"/>
<text x="436" y="88" fill="#8B949E" font-size="7" font-family="system-ui,sans-serif" letter-spacing="1">MONEY LEFT</text>
<text x="436" y="112" fill="#06D6A0" font-size="22" font-family="system-ui,sans-serif" font-weight="700">&#8377;6,840</text>
<text x="574" y="118" font-size="22" text-anchor="middle">&#x1F338;</text>
<rect x="436" y="126" width="158" height="5" rx="2.5" fill="rgba(255,255,255,0.07)"/>
<rect x="436" y="126" width="98" height="5" rx="2.5" fill="#06D6A0"/>

