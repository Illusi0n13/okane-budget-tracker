<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>お金トラッカー · Login</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Zen+Kaku+Gothic+New:wght@700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
</head>
<body>
<div class="particles" id="particles"></div>

<div class="box">
  <div class="mascot">🌸</div>
  <h1>お金トラッカー</h1>
  <div class="sub">Okane Budget Tracker</div>

  <div class="auth-tabs">
    <button class="auth-tab active" id="tabLogin" onclick="showTab('login')">Login</button>
    <button class="auth-tab" id="tabSignup" onclick="showTab('signup')">Sign Up</button>
  </div>

  <div class="err-msg" id="errMsg"></div>

  <!-- LOGIN -->
  <div id="formLogin">
    <div class="fg"><label class="fl">Username</label><input class="fi" id="lUser" type="text" placeholder="your username" autocomplete="username"></div>
    <div class="fg"><label class="fl">Password</label><input class="fi" id="lPass" type="password" placeholder="your password" autocomplete="current-password"></div>
    <button class="btn-main" onclick="doLogin()">✨ Login</button>
  </div>

  <!-- SIGNUP -->
  <div id="formSignup" style="display:none">
    <div class="fg"><label class="fl">Display Name</label><input class="fi" id="sName" type="text" placeholder="e.g. Rahul" autocomplete="name"></div>
    <div class="fg"><label class="fl">Username</label><input class="fi" id="sUser" type="text" placeholder="choose a username" autocomplete="username"></div>
    <div class="fg"><label class="fl">Password</label><input class="fi" id="sPass" type="password" placeholder="min 4 characters" autocomplete="new-password"></div>
    <button class="btn-main" onclick="doSignup()">🚀 Create Account</button>
  </div>
</div>

<script src="{{ url_for('static', filename='js/login.js') }}"></script>
</body>
</html>
